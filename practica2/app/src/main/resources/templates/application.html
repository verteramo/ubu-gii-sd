<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<body layout:fragment="body-content">

    <header>
        <nav class="navbar navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="#" th:text="#{layout.title}">layout.title</a>
                <div class="d-flex align-items-center">
                    <span class="text-white me-3"
                        th:text="#{application.user(${user.name}, ${user.role.name})}">application.user</span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm"
                        th:text="#{application.logout}">application.logout</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container" layout:fragment="app-content">
        <!-- Application content -->
    </main>

    <footer class="mt-5 py-3 border-top text-center text-muted">
        <small th:text="#{application.footer.text}">application.footer.text</small>
    </footer>

</body>

</html>
