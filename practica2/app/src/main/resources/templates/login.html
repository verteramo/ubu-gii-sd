<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title th:text="#{login.title}">login.title</title>
</head>

<body layout:fragment="body-content">
    <div class="bg-light d-flex align-items-center vh-100">
        <div class="container border rounded p-4 bg-white shadow-sm" style="max-width: 400px;">
            <h2 class="text-center mb-1" th:text="#{login.title}">login.title</h2>
            <p class="text-center text-muted small mb-4" th:text="#{login.testcredentials}">login.testcredentials
            </p>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{login.username.label}">login.username.label</label>
                    <input type="text" name="username" class="form-control"
                        th:placeholder="#{login.username.placeholder}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{login.password.label}">login.password.label</label>
                    <input type="password" name="password" class="form-control"
                        th:placeholder="#{login.password.placeholder}" required>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2">
                    <p class="mb-0 small" th:text="#{login.errormessage}">login.errormessage</p>
                </div>

                <button type="submit" class="btn btn-primary w-100" th:text="#{login.button}">login.button</button>
            </form>
        </div>
    </div>
</body>

</html>
