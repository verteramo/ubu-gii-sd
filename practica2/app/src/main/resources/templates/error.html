<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title th:text="#{error.title}">error.title</title>
</head>

<body layout:fragment="body-content">
    <main class="bg-light d-flex align-items-center vh-100">
        <div class="container text-center border rounded p-5 bg-white shadow-sm" style="max-width: 600px;">

            <th:block th:switch="${error != null}">
                <th:block th:case="true">
                    <i class="fa-solid fa-triangle-exclamation text-warning mb-3" style="font-size: 4rem;"></i>
                    <h1 class="display-1 fw-bold text-dark" th:text="${status}">status</h1>
                    <h2 class="h3 mb-3" th:text="${error}">error</h2>
                    <p class="text-muted mb-4" th:text="${message}">message</p>
                </th:block>

                <th:block th:case="*">
                    <h2 class="h4 mb-4" th:text="#{error.direct.access}">error.direct.access</h2>
                </th:block>
            </th:block>

            <a th:href="@{/login}" class="btn btn-primary px-4" th:text="#{error.homebutton}">error.homebutton</a>
        </div>
    </main>
</body>

</html>
